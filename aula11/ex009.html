<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>País</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #82ade5;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Você é Brasileiro ou Estrangeiro?</h1>
    Informe seu país de origem: <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res">

    <script>
        function verificar() {
            var txtPais = window.document.querySelector('input#txtpais')
            var res = window.document.querySelector('div#res')
            var pais = txtPais.value

            if (pais === "Brasil") {
                res.innerHTML = `<p>Você é Brasileiro!</p>`
            } else {
                res.innerHTML = `<p>Você é Estrangeiro!</p>`
            }
        }
    </script>

</body>
</html>
