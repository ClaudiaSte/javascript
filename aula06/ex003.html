<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa</title>
    <style>
        body{
            background-color: #eda2a2;
            font-family: Arial, sans-serif;
        }
</style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Bem-vindo ao meu primeiro programa em JavaScript!</p>

    <script>
      var n1 = Number(window.prompt("Digite um número: "));//string
      var n2 = Number(window.prompt("Digite outro número: ")); //string
      var s = n1 + n2
      window.alert(`A soma entre ${n1} e ${n2} é ${s}`) //contatenação
      // number+number para adição
      // string+string para concatenação
    </script>
</body>
</html>
